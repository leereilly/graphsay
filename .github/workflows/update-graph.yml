name: Update Contribution Graph

on:
  schedule:
    # 1am EST = 6am UTC (EST is UTC-5)
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-graph:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate contribution graph
        run: |
          TODAY=$(TZ="America/New_York" date +%Y-%m-%d)
          echo "Today (EST): $TODAY"

          # Look up today's message from holidays.csv
          MESSAGE=$(grep "^${TODAY}" holidays.csv | cut -f2)

          if [ -z "$MESSAGE" ]; then
            MESSAGE="Hello there! Use this to create your own animated contribution graph messages"
          fi

          echo "Message: $MESSAGE"
          node dist/cli.js -m "$MESSAGE" -f svg -t both -o contribution-graph.svg

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add contribution-graph.svg
          git diff --staged --quiet || (git commit -m "Update daily contribution graph message" && git push)
